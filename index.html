<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI integrated MPS 연구팀 - 활동비 관리</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: "Segoe UI", "Malgun Gothic", Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #f093fb 0%, #f5576c 100%);
            min-height: 100vh;
            padding: 20px;
            color: #333;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
        }

        .header {
            background: #fff;
            border-radius: 10px;
            padding: 30px;
            margin-bottom: 30px;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
        }

        .team-name {
            font-size: 28px;
            font-weight: 700;
            margin-bottom: 10px;
        }

        .last-updated {
            font-size: 12px;
            color: #777;
        }

        .dashboard {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(260px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }

        .card,
        .transactions {
            background: #fff;
            border-radius: 10px;
            padding: 25px;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
        }

        .card {
            transition: transform 0.3s ease;
        }

        .card:hover {
            transform: translateY(-5px);
        }

        .card-title {
            font-size: 14px;
            color: #777;
            letter-spacing: 0;
            margin-bottom: 15px;
        }

        .card-value {
            font-size: 32px;
            font-weight: 700;
            word-break: keep-all;
        }

        .card.budget {
            border-left: 4px solid #f093fb;
        }

        .card.spent {
            border-left: 4px solid #fa709a;
        }

        .card.remaining {
            border-left: 4px solid #fee140;
        }

        .card-value.warning {
            color: #e74c3c;
        }

        .card-value.success {
            color: #27ae60;
        }

        .percentage-bar {
            width: 100%;
            height: 8px;
            background: #ecf0f1;
            border-radius: 4px;
            margin-top: 15px;
            overflow: hidden;
        }

        .percentage-fill {
            height: 100%;
            max-width: 100%;
            background: linear-gradient(90deg, #f093fb 0%, #f5576c 100%);
            border-radius: 4px;
            transition: width 0.3s ease;
        }

        .transactions-title {
            font-size: 20px;
            font-weight: 700;
            color: #333;
        }

        .transaction-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            gap: 16px;
            padding: 15px 0;
            border-bottom: 1px solid #ecf0f1;
        }

        .transaction-item:last-child {
            border-bottom: none;
        }

        .transaction-date {
            font-size: 12px;
            color: #777;
            margin-bottom: 5px;
        }

        .transaction-desc {
            font-size: 14px;
            font-weight: 600;
        }

        .transaction-round {
            font-size: 12px;
            color: #777;
            margin-top: 5px;
        }

        .transaction-amount {
            font-size: 16px;
            font-weight: 700;
            color: #e74c3c;
            min-width: 110px;
            text-align: right;
            white-space: nowrap;
        }

        .no-data,
        .loading {
            text-align: center;
            padding: 40px;
            color: #777;
        }

        .loading {
            color: #f5576c;
        }

        .error {
            background: #fee;
            color: #c33;
            padding: 15px;
            border-radius: 6px;
            margin-bottom: 20px;
            line-height: 1.5;
        }

        .refresh-btn {
            background: #f5576c;
            color: #fff;
            border: none;
            padding: 10px 18px;
            border-radius: 5px;
            cursor: pointer;
            font-size: 14px;
            transition: background 0.3s ease;
        }

        .refresh-btn:hover {
            background: #f093fb;
        }

        .filter-section {
            margin-bottom: 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            gap: 16px;
        }

        @media (max-width: 768px) {
            body {
                padding: 14px;
            }

            .header,
            .card,
            .transactions {
                padding: 20px;
            }

            .team-name {
                font-size: 22px;
            }

            .card-value {
                font-size: 24px;
            }

            .dashboard {
                grid-template-columns: 1fr;
            }

            .filter-section,
            .transaction-item {
                align-items: flex-start;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <div class="team-name">AI integrated MPS 연구팀</div>
            <div class="last-updated">마지막 업데이트: <span id="lastUpdate">로딩 중...</span></div>
        </div>

        <div id="errorMsg" class="error" style="display: none;"></div>

        <div class="dashboard">
            <div class="card budget">
                <div class="card-title">총 예산</div>
                <div class="card-value" id="totalBudget">-</div>
            </div>

            <div class="card spent">
                <div class="card-title">사용액</div>
                <div class="card-value" id="spentAmount">-</div>
            </div>

            <div class="card remaining">
                <div class="card-title">잔액</div>
                <div class="card-value" id="remainingAmount">-</div>
            </div>
        </div>

        <div class="dashboard">
            <div class="card">
                <div class="card-title">사용률</div>
                <div class="percentage-bar">
                    <div class="percentage-fill" id="percentageBar" style="width: 0%"></div>
                </div>
                <div style="text-align: center; margin-top: 10px; font-size: 14px; color: #666;">
                    <span id="percentageText">0%</span>
                </div>
            </div>
        </div>

        <div class="transactions">
            <div class="filter-section">
                <div class="transactions-title">최근 거래 내역</div>
                <button class="refresh-btn" type="button" onclick="loadData()">새로고침</button>
            </div>
            <div id="transactionList" class="loading">로딩 중...</div>
        </div>
    </div>

    <script>
        const SPREADSHEET_ID = "1IlJyCo1tP64REEkJs6hvSYC5s2DLMjy7ta8QSFllzTk";
        const MASTER_SHEET_NAME = "관리자_마스터 예산";
        const RESPONSE_SHEET_NAME = "설문지 응답 2";
        const TEAM_NAME = "AI integrated MPS 연구팀";

        async function loadData() {
            try {
                clearError();
                setLoading(true);

                const [masterRecords, responseRecords] = await Promise.all([
                    loadGoogleSheet(MASTER_SHEET_NAME),
                    loadGoogleSheet(RESPONSE_SHEET_NAME)
                ]);

                const teamData = parseTeamData(masterRecords, TEAM_NAME);
                if (!teamData) {
                    throw new Error(`마스터 예산 시트에서 '${TEAM_NAME}' 팀 정보를 찾지 못했습니다.`);
                }

                const transactions = parseTransactions(responseRecords, TEAM_NAME);
                updateDashboard(teamData, transactions);
                updateLastUpdate();
            } catch (error) {
                console.error(error);
                showError(error.message || "데이터를 불러오는 중 오류가 발생했습니다.");
            } finally {
                setLoading(false);
            }
        }

        function loadGoogleSheet(sheetName) {
            return new Promise((resolve, reject) => {
                const callbackName = `sheetCallback_${Date.now()}_${Math.random().toString(36).slice(2)}`;
                const script = document.createElement("script");
                const timeoutId = setTimeout(() => {
                    cleanup();
                    reject(new Error(`'${sheetName}' 시트 응답 시간이 초과되었습니다.`));
                }, 15000);

                function cleanup() {
                    clearTimeout(timeoutId);
                    delete window[callbackName];
                    script.remove();
                }

                window[callbackName] = (response) => {
                    cleanup();
                    if (response.status !== "ok") {
                        reject(new Error(`'${sheetName}' 시트 로딩 실패: ${response.errors?.[0]?.detailed_message || response.status}`));
                        return;
                    }
                    resolve(tableToRecords(response.table));
                };

                script.onerror = () => {
                    cleanup();
                    reject(new Error(`'${sheetName}' 시트에 접근할 수 없습니다. 공유 권한을 확인해주세요.`));
                };

                const params = new URLSearchParams({
                    tqx: `out:json;responseHandler:${callbackName}`,
                    sheet: sheetName,
                    cacheBust: Date.now().toString()
                });
                script.src = `https://docs.google.com/spreadsheets/d/${SPREADSHEET_ID}/gviz/tq?${params.toString()}`;
                document.head.appendChild(script);
            });
        }

        function tableToRecords(table) {
            const headers = table.cols.map((col) => (col.label || "").trim());
            return table.rows.map((row) => {
                const record = {};
                headers.forEach((header, index) => {
                    const cell = row.c[index];
                    record[header] = {
                        value: cell?.v ?? "",
                        formatted: cell?.f ?? cell?.v ?? ""
                    };
                });
                return record;
            });
        }

        function parseTeamData(records, teamName) {
            const record = records.find((item) => getValue(item, "팀명") === teamName);
            if (!record) return null;

            return {
                team: getValue(record, "팀명"),
                totalBudget: toNumber(getValue(record, "활동비 총 예산")),
                spent: toNumber(getValue(record, "학술원 기입 지출액")),
                remaining: toNumber(getValue(record, "현재 활동비 잔액"))
            };
        }

        function parseTransactions(records, teamName) {
            return records
                .filter((record) => getValue(record, "대상 팀 명") === teamName)
                .map((record) => ({
                    date: getFormatted(record, "타임스탬프"),
                    dateValue: parseGoogleDate(getValue(record, "타임스탬프")),
                    round: getValue(record, "Q1. 관련 진행 회차"),
                    amount: toNumber(getValue(record, "Q2. 활동비 차감 금액")),
                    description: getValue(record, "Q3. 지출 내역 요약")
                }))
                .filter((transaction) => transaction.amount > 0)
                .sort((a, b) => b.dateValue - a.dateValue);
        }

        function getValue(record, headerName) {
            const matchedKey = Object.keys(record).find((key) => key.trim() === headerName.trim());
            return matchedKey ? record[matchedKey].value : "";
        }

        function getFormatted(record, headerName) {
            const matchedKey = Object.keys(record).find((key) => key.trim() === headerName.trim());
            return matchedKey ? record[matchedKey].formatted : "";
        }

        function toNumber(value) {
            if (typeof value === "number") return value;
            return Number(String(value).replace(/[^\d.-]/g, "")) || 0;
        }

        function parseGoogleDate(value) {
            if (value instanceof Date) return value;
            if (typeof value !== "string") return new Date(0);

            const match = value.match(/^Date\((\d+),(\d+),(\d+),(\d+),(\d+),(\d+)\)$/);
            if (match) {
                const [, year, month, day, hour, minute, second] = match.map(Number);
                return new Date(year, month, day, hour, minute, second);
            }

            const parsed = new Date(value);
            return Number.isNaN(parsed.getTime()) ? new Date(0) : parsed;
        }

        function updateDashboard(teamData, transactions) {
            document.getElementById("totalBudget").textContent = formatCurrency(teamData.totalBudget);
            document.getElementById("spentAmount").textContent = formatCurrency(teamData.spent);
            document.getElementById("remainingAmount").textContent = formatCurrency(teamData.remaining);

            const remainingEl = document.getElementById("remainingAmount");
            remainingEl.className = "card-value";
            remainingEl.classList.add(teamData.remaining <= teamData.totalBudget * 0.1 ? "warning" : "success");

            const percentage = teamData.totalBudget > 0 ? (teamData.spent / teamData.totalBudget) * 100 : 0;
            document.getElementById("percentageBar").style.width = `${Math.min(percentage, 100)}%`;
            document.getElementById("percentageText").textContent = `${percentage.toFixed(1)}%`;

            updateTransactionList(transactions);
        }

        function updateTransactionList(transactions) {
            const listEl = document.getElementById("transactionList");

            if (transactions.length === 0) {
                listEl.innerHTML = '<div class="no-data">거래 내역이 없습니다.</div>';
                return;
            }

            listEl.innerHTML = transactions.map((transaction) => `
                <div class="transaction-item">
                    <div class="transaction-info">
                        <div class="transaction-date">${escapeHtml(transaction.date || "-")}</div>
                        <div class="transaction-desc">${escapeHtml(transaction.description || "내역 없음")}</div>
                        <div class="transaction-round">${escapeHtml(transaction.round || "")}</div>
                    </div>
                    <div class="transaction-amount">-${formatCurrency(transaction.amount)}</div>
                </div>
            `).join("");
        }

        function setLoading(isLoading) {
            const listEl = document.getElementById("transactionList");
            if (isLoading) {
                listEl.className = "loading";
                listEl.textContent = "로딩 중...";
            } else {
                listEl.classList.remove("loading");
            }
        }

        function updateLastUpdate() {
            document.getElementById("lastUpdate").textContent = new Date().toLocaleString("ko-KR", {
                year: "numeric",
                month: "2-digit",
                day: "2-digit",
                hour: "2-digit",
                minute: "2-digit"
            });
        }

        function formatCurrency(value) {
            return new Intl.NumberFormat("ko-KR", {
                style: "currency",
                currency: "KRW",
                minimumFractionDigits: 0,
                maximumFractionDigits: 0
            }).format(value);
        }

        function escapeHtml(value) {
            return String(value).replace(/[&<>"']/g, (char) => ({
                "&": "&amp;",
                "<": "&lt;",
                ">": "&gt;",
                '"': "&quot;",
                "'": "&#39;"
            }[char]));
        }

        function showError(message) {
            const errorEl = document.getElementById("errorMsg");
            errorEl.textContent = `오류: ${message}`;
            errorEl.style.display = "block";
        }

        function clearError() {
            document.getElementById("errorMsg").style.display = "none";
        }

        window.addEventListener("load", loadData);
        setInterval(loadData, 60000);
    </script>
</body>
</html>
