<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI integrated MPS 연구팀 - 활동비 관리</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: "Segoe UI", "Malgun Gothic", Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #f093fb 0%, #f5576c 100%);
            min-height: 100vh;
            padding: 20px;
            color: #333;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
        }

        .header {
            background: #fff;
            border-radius: 10px;
            padding: 30px;
            margin-bottom: 30px;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
            display: flex;
            justify-content: space-between;
            align-items: center;
            gap: 20px;
        }

        .header-content {
            min-width: 0;
        }

        .form-link {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            flex: 0 0 auto;
            min-height: 42px;
            padding: 10px 16px;
            border-radius: 5px;
            background: #f5576c;
            color: #fff;
            font-size: 14px;
            font-weight: 600;
            text-decoration: none;
            transition: background 0.3s ease;
        }

        .form-link:hover {
            background: #f093fb;
        }

        .team-name {
            font-size: 28px;
            font-weight: 700;
            margin-bottom: 10px;
        }

        .last-updated {
            font-size: 12px;
            color: #777;
        }

        .dashboard {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(260px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }

        .card,
        .transactions {
            background: #fff;
            border-radius: 10px;
            padding: 25px;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
        }

        .card {
            transition: transform 0.3s ease;
        }

        .card:hover {
            transform: translateY(-5px);
        }

        .card-title {
            font-size: 20px;
            font-weight: 700;
            color: #333;
            letter-spacing: 0;
            margin-bottom: 6px;
        }

        .card-description {
            margin-bottom: 15px;
            color: #999;
            font-size: 12px;
            line-height: 1.5;
        }

        .card-value {
            font-size: 32px;
            font-weight: 700;
            word-break: keep-all;
        }

        .card.budget {
            border-left: 4px solid #f093fb;
        }

        .card.spent {
            border-left: 4px solid #fa709a;
        }

        .card.remaining {
            border-left: 4px solid #fee140;
        }

        .card-value.warning {
            color: #e74c3c;
        }

        .card-value.success {
            color: #27ae60;
        }

        .percentage-bar {
            width: 100%;
            height: 8px;
            background: #ecf0f1;
            border-radius: 4px;
            margin-top: 15px;
            overflow: hidden;
        }

        .percentage-fill {
            height: 100%;
            max-width: 100%;
            background: linear-gradient(90deg, #f093fb 0%, #f5576c 100%);
            border-radius: 4px;
            transition: width 0.3s ease;
        }

        .transactions-title {
            font-size: 20px;
            font-weight: 700;
            color: #333;
        }

        .transactions > .transactions-title {
            margin-bottom: 20px;
        }

        .transactions + .transactions {
            margin-top: 30px;
        }

        .transaction-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            gap: 16px;
            padding: 15px 0;
            border-bottom: 1px solid #ecf0f1;
        }

        .transaction-item:last-child {
            border-bottom: none;
        }

        .transaction-date {
            font-size: 12px;
            color: #777;
            margin-bottom: 5px;
        }

        .transaction-desc {
            font-size: 14px;
            font-weight: 600;
        }

        .transaction-round {
            font-size: 12px;
            color: #777;
            margin-top: 5px;
        }

        .meeting-history-round {
            font-size: 14px;
            font-weight: 600;
            color: #333;
            margin-top: 0;
        }

        .transaction-meeting-meta {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
            margin-top: 10px;
        }

        .transaction-meeting-meta span {
            background: #fff0f4;
            color: #b23556;
            border-radius: 4px;
            padding: 5px 8px;
            font-size: 12px;
            line-height: 1.3;
        }

        .transaction-discussion {
            margin-top: 10px;
            padding: 10px 12px;
            border-left: 3px solid #f5576c;
            background: #fff5f8;
            color: #444;
            font-size: 13px;
            line-height: 1.5;
            white-space: pre-wrap;
        }

        .transaction-warning {
            margin-top: 10px;
            color: #c33;
            font-size: 13px;
            font-weight: 600;
        }

        .transaction-amount {
            font-size: 16px;
            font-weight: 700;
            color: #e74c3c;
            min-width: 110px;
            text-align: right;
            white-space: nowrap;
        }

        .no-data,
        .loading {
            text-align: center;
            padding: 40px;
            color: #777;
        }

        .loading {
            color: #f5576c;
        }

        .error {
            background: #fee;
            color: #c33;
            padding: 15px;
            border-radius: 6px;
            margin-bottom: 20px;
            line-height: 1.5;
        }

        .warning-message {
            background: #fff7e6;
            color: #9a5b00;
            padding: 15px;
            border-radius: 6px;
            margin-bottom: 20px;
            line-height: 1.5;
        }

        .refresh-btn {
            background: #f5576c;
            color: #fff;
            border: none;
            padding: 10px 18px;
            border-radius: 5px;
            cursor: pointer;
            font-size: 14px;
            transition: background 0.3s ease;
        }

        .refresh-btn:hover {
            background: #f093fb;
        }

        .filter-section {
            margin-bottom: 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            gap: 16px;
        }

        .section-actions {
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .toggle-btn {
            background: #fff;
            color: #f5576c;
            border: 1px solid #f5576c;
            padding: 9px 14px;
            border-radius: 5px;
            cursor: pointer;
            font-size: 14px;
            transition: background 0.3s ease, color 0.3s ease;
        }

        .toggle-btn:hover {
            background: #fff0f4;
        }

        #transactionList[hidden] {
            display: none;
        }

        @media (max-width: 768px) {
            body {
                padding: 14px;
            }

            .header,
            .card,
            .transactions {
                padding: 20px;
            }

            .header {
                align-items: flex-start;
                flex-direction: column;
            }

            .form-link {
                width: 100%;
            }

            .team-name {
                font-size: 22px;
            }

            .card-value {
                font-size: 24px;
            }

            .dashboard {
                grid-template-columns: 1fr;
            }

            .filter-section,
            .transaction-item {
                align-items: flex-start;
            }

            .filter-section {
                flex-direction: column;
            }

            .section-actions {
                width: 100%;
            }

            .section-actions button {
                flex: 1;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <div class="header-content">
                <div class="team-name">AI integrated MPS 연구팀</div>
                <div class="last-updated">마지막 업데이트: <span id="lastUpdate">로딩 중...</span></div>
            </div>
            <a class="form-link" href="https://forms.gle/jiQefdUr6LReec1U6" target="_blank" rel="noopener noreferrer">모임 결과 및 지출 증빙</a>
        </div>

        <div id="errorMsg" class="error" style="display: none;"></div>
        <div id="warningMsg" class="warning-message" style="display: none;"></div>

        <div class="dashboard">
            <div class="card spent">
                <div class="card-title">활동비 사용액</div>
                <div class="card-description">총 100만원 내외 이용 가능 (식음료, 대관비 등 제외)</div>
                <div class="card-value" id="spentAmount">-</div>
            </div>
        </div>

        <div class="transactions">
            <div class="filter-section">
                <div class="transactions-title">최근 활동비 사용 내역</div>
                <div class="section-actions">
                    <button
                        id="transactionToggle"
                        class="toggle-btn"
                        type="button"
                        aria-expanded="true"
                        aria-controls="transactionList"
                        onclick="toggleTransactionDetails()"
                    >내역 접기</button>
                    <button class="refresh-btn" type="button" onclick="loadData()">새로고침</button>
                </div>
            </div>
            <div id="transactionList" class="loading">로딩 중...</div>
        </div>

        <div class="transactions">
            <div class="transactions-title">모임 히스토리</div>
            <div id="meetingHistoryList" class="loading">로딩 중...</div>
        </div>
    </div>

    <script>
        const SPREADSHEET_ID = "1IlJyCo1tP64REEkJs6hvSYC5s2DLMjy7ta8QSFllzTk";
        const MASTER_SHEET_NAME = "관리자_마스터 예산";
        const RESPONSE_SHEET_NAME = "설문지 응답 2";
        const MEETING_SHEET_NAME = "설문지 응답 1";
        const TEAM_NAME = "AI integrated MPS 연구팀";

        async function loadData() {
            try {
                clearError();
                clearWarning();
                setLoading(true);

                const [masterRecords, responseRecords, meetingRecords] = await Promise.all([
                    loadGoogleSheet(MASTER_SHEET_NAME),
                    loadGoogleSheet(RESPONSE_SHEET_NAME),
                    loadGoogleSheet(MEETING_SHEET_NAME)
                ]);

                const teamData = parseTeamData(masterRecords, TEAM_NAME);
                if (!teamData) {
                    throw new Error(`마스터 예산 시트에서 '${TEAM_NAME}' 팀 정보를 찾지 못했습니다.`);
                }

                const { transactions, warnings } = parseTransactions(responseRecords, meetingRecords, TEAM_NAME);
                const meetingHistory = parseMeetingHistory(meetingRecords, TEAM_NAME);
                if (warnings.length > 0) {
                    showWarning(`설문지 응답 1에서 매칭되는 논의 내용이 2건 이상인 사용 내역이 있습니다: ${warnings.join(", ")}. 참여 팀명과 진행회차를 확인해주세요.`);
                }
                updateDashboard(teamData, transactions, meetingHistory);
                updateLastUpdate();
            } catch (error) {
                console.error(error);
                showError(error.message || "데이터를 불러오는 중 오류가 발생했습니다.");
            } finally {
                setLoading(false);
            }
        }

        function loadGoogleSheet(sheetName) {
            return new Promise((resolve, reject) => {
                const callbackName = `sheetCallback_${Date.now()}_${Math.random().toString(36).slice(2)}`;
                const script = document.createElement("script");
                const timeoutId = setTimeout(() => {
                    cleanup();
                    reject(new Error(`'${sheetName}' 시트 응답 시간이 초과되었습니다.`));
                }, 15000);

                function cleanup() {
                    clearTimeout(timeoutId);
                    delete window[callbackName];
                    script.remove();
                }

                window[callbackName] = (response) => {
                    cleanup();
                    if (response.status !== "ok") {
                        reject(new Error(`'${sheetName}' 시트 로딩 실패: ${response.errors?.[0]?.detailed_message || response.status}`));
                        return;
                    }
                    resolve(tableToRecords(response.table));
                };

                script.onerror = () => {
                    cleanup();
                    reject(new Error(`'${sheetName}' 시트에 접근할 수 없습니다. 공유 권한을 확인해주세요.`));
                };

                const params = new URLSearchParams({
                    tqx: `out:json;responseHandler:${callbackName}`,
                    sheet: sheetName,
                    cacheBust: Date.now().toString()
                });
                script.src = `https://docs.google.com/spreadsheets/d/${SPREADSHEET_ID}/gviz/tq?${params.toString()}`;
                document.head.appendChild(script);
            });
        }

        function tableToRecords(table) {
            const headers = table.cols.map((col) => (col.label || "").trim());
            return table.rows.map((row) => {
                const record = {};
                headers.forEach((header, index) => {
                    const cell = row.c[index];
                    record[header] = {
                        value: cell?.v ?? "",
                        formatted: cell?.f ?? cell?.v ?? ""
                    };
                });
                return record;
            });
        }

        function parseTeamData(records, teamName) {
            const record = records.find((item) => getValue(item, "팀명") === teamName);
            if (!record) return null;

            return {
                team: getValue(record, "팀명"),
                spent: toNumber(getValue(record, "학술원 기입 지출액"))
            };
        }

        function parseTransactions(records, meetingRecords, teamName) {
            const discussionLookup = buildDiscussionLookup(meetingRecords, teamName);
            const duplicateWarnings = new Set();

            const transactions = records
                .filter((record) => getValue(record, "대상 팀 명") === teamName)
                .map((record) => {
                    const transaction = {
                        date: getFormatted(record, "타임스탬프"),
                        dateValue: parseGoogleDate(getValue(record, "타임스탬프")),
                        round: getValue(record, "Q1. 관련 진행 회차"),
                        amount: toNumber(getValue(record, "Q2. 활동비 차감 금액")),
                        description: getValue(record, "Q3. 지출 내역 요약"),
                        discussion: "",
                        hasDuplicateDiscussion: false
                    };
                    const matches = discussionLookup.get(buildDiscussionKey(teamName, transaction.round)) || [];

                    if (matches.length === 1) {
                        transaction.discussion = matches[0].discussion;
                        transaction.meetingDate = matches[0].meetingDate;
                        transaction.attendeeCount = matches[0].attendeeCount;
                    } else if (matches.length > 1) {
                        transaction.hasDuplicateDiscussion = true;
                        duplicateWarnings.add(`${transaction.round || "진행회차 없음"} (${matches.length}건)`);
                    }

                    return transaction;
                })
                .filter((transaction) => transaction.amount > 0)
                .sort((a, b) => b.dateValue - a.dateValue);

            return {
                transactions,
                warnings: [...duplicateWarnings]
            };
        }

        function buildDiscussionLookup(records, teamName) {
            const lookup = new Map();

            records
                .filter((record) => getValue(record, "참여 팀 명") === teamName)
                .forEach((record) => {
                    const round = getValue(record, "Q1. 진행 회차");
                    const key = buildDiscussionKey(teamName, round);
                    if (!key) return;

                    const matches = lookup.get(key) || [];
                    matches.push({
                        round,
                        meetingDate: formatMeetingDate(getValue(record, "Q2. 모임 진행 일자"), getFormatted(record, "Q2. 모임 진행 일자")),
                        attendeeCount: getFormatted(record, "Q3. 총 참석 인원") || getValue(record, "Q3. 총 참석 인원"),
                        discussion: getValue(record, "Q4. 주요 논의 내용 및 결과")
                    });
                    lookup.set(key, matches);
                });

            return lookup;
        }

        function parseMeetingHistory(records, teamName) {
            return records
                .filter((record) => getValue(record, "참여 팀 명") === teamName)
                .map((record) => ({
                    round: getValue(record, "Q1. 진행 회차"),
                    meetingDate: formatMeetingDate(getValue(record, "Q2. 모임 진행 일자"), getFormatted(record, "Q2. 모임 진행 일자")),
                    attendeeCount: getFormatted(record, "Q3. 총 참석 인원") || getValue(record, "Q3. 총 참석 인원"),
                    discussion: getValue(record, "Q4. 주요 논의 내용 및 결과"),
                    dateValue: parseGoogleDate(getValue(record, "타임스탬프"))
                }))
                .sort((a, b) => b.dateValue - a.dateValue);
        }

        function buildDiscussionKey(teamName, round) {
            const normalizedTeam = normalizeMatchValue(teamName);
            const normalizedRound = normalizeMatchValue(round);
            return normalizedTeam && normalizedRound ? `${normalizedTeam}::${normalizedRound}` : "";
        }

        function normalizeMatchValue(value) {
            return String(value || "").trim().replace(/\s+/g, " ");
        }

        function formatMeetingDate(rawValue, formattedValue) {
            const source = String(rawValue || formattedValue || "").trim();
            let date = null;

            const googleDateMatch = source.match(/^Date\((\d+),(\d+),(\d+)\)$/);
            if (googleDateMatch) {
                const [, year, month, day] = googleDateMatch.map(Number);
                date = new Date(year, month, day);
            } else {
                const displayValue = String(formattedValue || rawValue || "").trim();
                const dateParts = displayValue.match(/(?:(\d{4})\.\s*)?(\d{1,2})\.\s*(\d{1,2})/);
                if (dateParts) {
                    const year = dateParts[1] ? Number(dateParts[1]) : 2026;
                    const month = Number(dateParts[2]) - 1;
                    const day = Number(dateParts[3]);
                    date = new Date(year, month, day);
                }
            }

            if (!date || Number.isNaN(date.getTime())) return formattedValue || rawValue || "";

            const weekdays = ["일", "월", "화", "수", "목", "금", "토"];
            const year = date.getFullYear();
            const month = String(date.getMonth() + 1).padStart(2, "0");
            const day = String(date.getDate()).padStart(2, "0");
            return `${year}-${month}-${day} (${weekdays[date.getDay()]})`;
        }

        function getValue(record, headerName) {
            const matchedKey = Object.keys(record).find((key) => key.trim() === headerName.trim());
            return matchedKey ? record[matchedKey].value : "";
        }

        function getFormatted(record, headerName) {
            const matchedKey = Object.keys(record).find((key) => key.trim() === headerName.trim());
            return matchedKey ? record[matchedKey].formatted : "";
        }

        function toNumber(value) {
            if (typeof value === "number") return value;
            return Number(String(value).replace(/[^\d.-]/g, "")) || 0;
        }

        function parseGoogleDate(value) {
            if (value instanceof Date) return value;
            if (typeof value !== "string") return new Date(0);

            const match = value.match(/^Date\((\d+),(\d+),(\d+),(\d+),(\d+),(\d+)\)$/);
            if (match) {
                const [, year, month, day, hour, minute, second] = match.map(Number);
                return new Date(year, month, day, hour, minute, second);
            }

            const parsed = new Date(value);
            return Number.isNaN(parsed.getTime()) ? new Date(0) : parsed;
        }

        function updateDashboard(teamData, transactions, meetingHistory) {
            document.getElementById("spentAmount").textContent = formatCurrency(teamData.spent);
            updateTransactionList(transactions);
            updateMeetingHistory(meetingHistory);
        }

        function updateTransactionList(transactions) {
            const listEl = document.getElementById("transactionList");

            if (transactions.length === 0) {
                listEl.innerHTML = '<div class="no-data">사용 내역이 없습니다.</div>';
                return;
            }

            listEl.innerHTML = transactions.map((transaction) => `
                <div class="transaction-item">
                    <div class="transaction-info">
                        <div class="transaction-desc">${escapeHtml(transaction.description || "내역 없음")}</div>
                        <div class="transaction-round">${escapeHtml(transaction.round || "")}</div>
                        ${(transaction.meetingDate || transaction.attendeeCount) ? `
                            <div class="transaction-meeting-meta">
                                ${transaction.meetingDate ? `<span>모임일: ${escapeHtml(transaction.meetingDate)}</span>` : ""}
                                ${transaction.attendeeCount ? `<span>참석 인원: ${escapeHtml(transaction.attendeeCount)}명</span>` : ""}
                            </div>
                        ` : ""}
                        ${transaction.hasDuplicateDiscussion ? '<div class="transaction-warning">논의 내용 매칭 데이터가 2건 이상입니다.</div>' : ""}
                    </div>
                    <div class="transaction-amount">-${formatCurrency(transaction.amount)}</div>
                </div>
            `).join("");
        }

        function updateMeetingHistory(meetings) {
            const listEl = document.getElementById("meetingHistoryList");

            if (meetings.length === 0) {
                listEl.innerHTML = '<div class="no-data">모임 기록이 없습니다.</div>';
                return;
            }

            listEl.innerHTML = meetings.map((meeting) => `
                <div class="transaction-item">
                    <div class="transaction-info">
                        <div class="transaction-round meeting-history-round">${escapeHtml(meeting.round || "진행회차 없음")}</div>
                        ${(meeting.meetingDate || meeting.attendeeCount) ? `
                            <div class="transaction-meeting-meta">
                                ${meeting.meetingDate ? `<span>모임일: ${escapeHtml(meeting.meetingDate)}</span>` : ""}
                                ${meeting.attendeeCount ? `<span>참석 인원: ${escapeHtml(meeting.attendeeCount)}명</span>` : ""}
                            </div>
                        ` : ""}
                        ${meeting.discussion ? `<div class="transaction-discussion">${escapeHtml(meeting.discussion)}</div>` : ""}
                    </div>
                </div>
            `).join("");
        }

        function toggleTransactionDetails() {
            const listEl = document.getElementById("transactionList");
            const toggleEl = document.getElementById("transactionToggle");
            const shouldExpand = listEl.hidden;

            listEl.hidden = !shouldExpand;
            toggleEl.setAttribute("aria-expanded", String(shouldExpand));
            toggleEl.textContent = shouldExpand ? "내역 접기" : "내역 펼치기";
        }

        function setLoading(isLoading) {
            const listEl = document.getElementById("transactionList");
            const historyEl = document.getElementById("meetingHistoryList");
            if (isLoading) {
                listEl.className = "loading";
                listEl.textContent = "로딩 중...";
                historyEl.className = "loading";
                historyEl.textContent = "로딩 중...";
            } else {
                listEl.classList.remove("loading");
                historyEl.classList.remove("loading");
            }
        }

        function updateLastUpdate() {
            document.getElementById("lastUpdate").textContent = new Date().toLocaleString("ko-KR", {
                year: "numeric",
                month: "2-digit",
                day: "2-digit",
                hour: "2-digit",
                minute: "2-digit"
            });
        }

        function formatCurrency(value) {
            return new Intl.NumberFormat("ko-KR", {
                style: "currency",
                currency: "KRW",
                minimumFractionDigits: 0,
                maximumFractionDigits: 0
            }).format(value);
        }

        function escapeHtml(value) {
            return String(value).replace(/[&<>"']/g, (char) => ({
                "&": "&amp;",
                "<": "&lt;",
                ">": "&gt;",
                '"': "&quot;",
                "'": "&#39;"
            }[char]));
        }

        function showError(message) {
            const errorEl = document.getElementById("errorMsg");
            errorEl.textContent = `오류: ${message}`;
            errorEl.style.display = "block";
        }

        function clearError() {
            document.getElementById("errorMsg").style.display = "none";
        }

        function showWarning(message) {
            const warningEl = document.getElementById("warningMsg");
            warningEl.textContent = `경고: ${message}`;
            warningEl.style.display = "block";
        }

        function clearWarning() {
            document.getElementById("warningMsg").style.display = "none";
        }

        window.addEventListener("load", loadData);
        setInterval(loadData, 60000);
    </script>
</body>
</html>
